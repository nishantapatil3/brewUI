name: Cask Sync Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-cask-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare app repo cask with tap cask
        shell: bash
        run: |
          set -euo pipefail

          APP_CASK_PATH="Casks/brewui.rb"
          TAP_CASK_URL="https://raw.githubusercontent.com/nishantapatil3/homebrew-tap/main/Casks/brewui.rb"

          if [[ ! -f "${APP_CASK_PATH}" ]]; then
            echo "Missing ${APP_CASK_PATH}"
            exit 1
          fi

          curl -fsSL "${TAP_CASK_URL}" -o /tmp/tap-brewui.rb

          app_version="$(sed -n 's/^[[:space:]]*version[[:space:]]*\"\\([^\"]*\\)\"/\\1/p' "${APP_CASK_PATH}" | head -n1)"
          app_sha="$(sed -n 's/^[[:space:]]*sha256[[:space:]]*\"\\([^\"]*\\)\"/\\1/p' "${APP_CASK_PATH}" | head -n1)"
          tap_version="$(sed -n 's/^[[:space:]]*version[[:space:]]*\"\\([^\"]*\\)\"/\\1/p' /tmp/tap-brewui.rb | head -n1)"
          tap_sha="$(sed -n 's/^[[:space:]]*sha256[[:space:]]*\"\\([^\"]*\\)\"/\\1/p' /tmp/tap-brewui.rb | head -n1)"

          echo "app repo cask: version=${app_version} sha256=${app_sha}"
          echo "tap repo cask: version=${tap_version} sha256=${tap_sha}"

          if [[ "${app_version}" != "${tap_version}" || "${app_sha}" != "${tap_sha}" ]]; then
            echo "Cask drift detected between app repo and tap repo."
            exit 1
          fi

          echo "Cask files are in sync."
